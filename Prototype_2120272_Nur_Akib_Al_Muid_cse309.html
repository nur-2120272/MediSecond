  ================================================================
  MediSecond — AI-Driven Medical Second Opinion Platform
  ================================================================
  HOW TO RUN:
    Just open this file in any modern browser (Chrome, Edge,
    Firefox, Safari). No server, no npm, no build step needed.

  LIBRARIES LOADED FROM CDN:
    • React 18         — UI rendering
    • ReactDOM 18      — mounting the app into the page
    • Babel Standalone — compiles JSX in the browser at runtime

  ALL ICONS are hand-coded as inline SVG components at the top
  of the script block, so the app works 100% offline too
  (apart from the Google Fonts import below).

  DEMO ACCOUNTS (pre-filled in the login modal):
    Admin   → admin@medisecond.ai   / Admin@123
    Doctor  → dr.wilson@medisecond.ai / Doctor@123
    Patient → patient@medisecond.ai  / Patient@123
  ================================================================
  -->

    body { font-family: 'DM Sans', sans-serif; background: #F0F4F8; }

    /* Custom scrollbar so the sidebar looks clean */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

    /* Smooth focus outlines for accessibility */
    :focus-visible { outline: 2px solid #0B7A75; outline-offset: 2px; }

    /* Native <select> and <input> inherit the font properly */
    input, select, textarea, button { font-family: 'DM Sans', sans-serif; }

    /* Prevent horizontal overflow on mobile */
    body { overflow-x: hidden; }
  </style>
</head>

  ================================================================

  <script type="text/babel">

    // ============================================================
    // SECTION 0 — INLINE SVG ICON SYSTEM
    // I define every icon used in the app as a tiny React
    // component returning raw SVG. This way the file has zero
    // external icon dependencies and works fully offline.
    // All icons follow the Lucide icon style:
    //   • 24×24 viewport
    //   • stroke-based, fill="none"
    //   • strokeLinecap / strokeLinejoin = "round"
    // ============================================================

    /** Base wrapper so every icon shares the same SVG shell */
    const Ico = ({ size=18, color="currentColor", fill="none", style={}, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
        viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2"
        strokeLinecap="round" strokeLinejoin="round"
        style={{ flexShrink:0, display:"inline-block", ...style }}>
        {children}
      </svg>
    );

    /* Each icon below is a named component matching the Lucide API */

    const Shield = p => <Ico {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Ico>;
    const Lock   = p => <Ico {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Ico>;
    const Globe  = p => <Ico {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Ico>;

    const BookOpen = p => <Ico {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Ico>;
    const Users  = p => <Ico {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Ico>;

    const FileText = p => <Ico {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></Ico>;

    // ============================================================
    // SECTION 3 — UTILITY FUNCTIONS
    // Small pure helpers I reuse in many components.
    // ============================================================

    /** Format an ISO date string into a readable label */
    const fmtDate = iso => {
      const d = new Date(iso);
      return d.toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
    };

    /** Format bytes into KB / MB */
    const fmtSize = bytes => {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1048576) return (bytes/1024).toFixed(1) + " KB";
      return (bytes/1048576).toFixed(2) + " MB";
    };

    /** Return colour config for a post priority level */
    const priorityBadge = p => ({
      high:   { bg:"#FEE2E2", color:"#991B1B", label:"High Priority" },
      medium: { bg:"#FEF3C7", color:"#92400E", label:"Medium Priority" },
      low:    { bg:"#D1FAE5", color:"#065F46", label:"Low Priority" },
    }[p] || { bg:"#E2E8F0", color:"#475569", label:"Normal" });

    /** Return colour config for a post status */
    const statusBadge = s => ({
      pending:   { bg:"#FEF3C7", color:"#92400E", label:"Awaiting Review" },
      responded: { bg:"#D1FAE5", color:"#065F46", label:"Responded" },
      published: { bg:"#DBEAFE", color:"#1E40AF", label:"Published" },
      closed:    { bg:"#F1F5F9", color:"#475569", label:"Closed" },
    }[s] || { bg:"#E2E8F0", color:"#475569", label: s });

    /** Normalise an attachment object — ensures 'isImage' is always set.
        Seed data has no isImage field so we derive it from the type string. */
    const normaliseAttachment = a => ({
      ...a,
      isImage: a.isImage !== undefined ? a.isImage : (a.type || "").startsWith("image/"),
    });

    // ── Reusable small UI atoms ─────────────────────────────────

    /** Coloured circle with initials — used everywhere as an avatar */
    const Avatar = ({ initials, size=36, bg=T.teal, color="#fff" }) => (
      <div style={{ width:size, height:size, borderRadius:"50%", background:bg, color,
        display:"flex", alignItems:"center", justifyContent:"center",
        fontSize:size*0.35, fontWeight:700, flexShrink:0 }}>
        {initials}
      </div>
    );

    /** Pill badge showing the user's role */
    const RoleBadge = ({ role }) => {
      const c = { admin:{bg:"#EDE9FE",color:"#5B21B6",label:"Admin"}, doctor:{bg:"#DBEAFE",color:"#1E40AF",label:"Doctor"}, patient:{bg:"#D1FAE5",color:"#065F46",label:"Patient"} }[role]||{};

    // ============================================================
    // SECTION 4 — LANDING PAGE
    // The public-facing marketing page visitors see before login.
    // I designed it to feel like a trusted medical institution —
    // authoritative navy/teal palette with warm amber CTAs.

    // ============================================================
    // SECTION 6 — FILE ATTACHMENT HOOK
    // I validate file type (PDF / JPEG / JPG only) and size
    // (≤ 25 MB). For both images AND PDFs I now read the full
    // base64 data-URL so that doctors and admins can open the
    // file from the post card later via a lightbox / new tab.
    // ============================================================

    const MAX_BYTES = 25 * 1024 * 1024; // 25 MB in bytes

    function useAttachments() {
      const [attachments, setAttachments] = useState([]);
      const [fileErr, setFileErr]         = useState("");

      const addFiles = fileList => {
        setFileErr("");
        Array.from(fileList).forEach(file => {
          const allowed = ["application/pdf","image/jpeg","image/jpg"];
          if (!allowed.includes(file.type)) { setFileErr("Only PDF and JPEG/JPG files are accepted."); return; }
          if (file.size > MAX_BYTES)        { setFileErr(`"${file.name}" exceeds the 25 MB limit.`); return; }
          /* Read EVERY file as base64 — images get a thumbnail preview,
             PDFs get a data-URL that we can open in a new browser tab.
             This is the key change that enables doctors/admins to view
             all attached files regardless of format. */
          const reader = new FileReader();
          reader.onload = e => {
            const dataUrl = e.target.result;
            setAttachments(prev => [...prev, {
              id:      Date.now() + Math.random(),
              name:    file.name,
              size:    file.size,
              type:    file.type,
              // preview = the full data-URL for both images and PDFs
              preview: dataUrl,
              // isImage flag helps the viewer decide how to render it
              isImage: file.type.startsWith("image/"),
            }]);
          };
          reader.readAsDataURL(file);
        });
      };

      const remove = id => setAttachments(prev => prev.filter(a => a.id !== id));
      const clear  = ()  => setAttachments([]);

      return { attachments, addFiles, remove, clear, fileErr, setFileErr };
    }

    // ============================================================
    // SECTION 6b — FILE VIEWER MODAL
    // Opens when a doctor or admin clicks on an attachment.
    // • JPEG/JPG → renders a full-size image lightbox
    // • PDF      → opens the data-URL in a new browser tab
    //              (browsers have native PDF viewers built in)
    // ============================================================

    function FileViewer({ file, onClose }) {
      /* For PDFs we open a new tab immediately and close the modal */
      useEffect(() => {
        if (!file.isImage) {
          /* Create a temporary anchor that triggers the browser's
             built-in PDF viewer in a new tab */
          const a = document.createElement("a");
          a.href   = file.preview;
          a.target = "_blank";
          a.rel    = "noopener noreferrer";
          a.click();
          onClose();
        }
      }, []);

      /* Image lightbox */
      if (!file.isImage) return null;

      return (
        <div
          onClick={onClose}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", zIndex:300,
            display:"flex", alignItems:"center", justifyContent:"center", padding:20, cursor:"zoom-out" }}>
          {/* Stop propagation so clicking the image itself doesn't close */}
          <div onClick={e => e.stopPropagation()} style={{ position:"relative", maxWidth:"90vw", maxHeight:"90vh" }}>
            <img src={file.preview} alt={file.name}
              style={{ maxWidth:"100%", maxHeight:"85vh", objectFit:"contain", borderRadius:10, display:"block" }}/>
            {/* File name caption */}
            <div style={{ position:"absolute", bottom:-32, left:0, right:0, textAlign:"center", color:"rgba(255,255,255,0.65)", fontSize:13 }}>
              {file.name} — {fmtSize(file.size)}
            </div>
            {/* Close button */}
            <button onClick={onClose}
              style={{ position:"absolute", top:-14, right:-14, width:30, height:30, borderRadius:"50%",
                background:"rgba(255,255,255,0.15)", border:"1.5px solid rgba(255,255,255,0.25)",
                color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <X size={14}/>
            </button>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION 7 — CREATE / EDIT POST MODAL
    // Available to patients (new posts) and admins (new + edit).
    // Includes drag-and-drop file zone with live attachment list.
    // ============================================================

    const CATEGORIES = ["Cardiology","Neurology","Oncology","Orthopaedics","Radiology","General Medicine","Endocrinology","Gastroenterology","Psychiatry","Announcement","Other"];

    function PostModal({ onClose, onSave, existingPost=null }) {
      const [form, setForm] = useState({
        title:    existingPost?.title    || "",
        content:  existingPost?.content  || "",
        category: existingPost?.category || "General Medicine",
        priority: existingPost?.priority || "medium",
      });
      const { attachments, addFiles, remove, fileErr } = useAttachments();
      const [err, setErr]         = useState("");
      const [dragging, setDragging] = useState(false);
      const fileRef = useRef();

      const handleSave = () => {
        if (!form.title.trim())   { setErr("Please add a title to your case."); return; }
        if (!form.content.trim()) { setErr("Please describe your case."); return; }
        onSave({ ...form, attachments });
      };

      const handleDrop = e => {
        e.preventDefault(); setDragging(false);
        addFiles(e.dataTransfer.files);
      };

      const inp = { width:"100%", padding:"9px 13px", border:`1.5px solid ${T.border}`, borderRadius:8, fontSize:14, color:T.text, background:T.surface, outline:"none" };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div style={{ background:T.surface, borderRadius:18, width:"100%", maxWidth:600, maxHeight:"92vh", overflowY:"auto", boxShadow:"0 24px 60px rgba(0,0,0,0.28)" }}>

            {/* Modal header */}
            <div style={{ padding:"22px 26px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <h2 style={{ fontSize:17, fontWeight:700, color:T.navy }}>{existingPost ? "Edit Case Post" : "Submit a New Case"}</h2>
              <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", color:T.muted }}><X size={19}/></button>
            </div>

            <div style={{ padding:26, display:"flex", flexDirection:"column", gap:16 }}>
              {(err||fileErr) && (
                <div style={{ background:T.redBg, color:T.red, borderRadius:8, padding:"9px 13px", fontSize:13, display:"flex", gap:7 }}>
                  <AlertCircle size={14} style={{ flexShrink:0, marginTop:1 }}/> {err||fileErr}
                </div>
              )}

              <div>
                <label style={{ fontSize:13, fontWeight:600, color:T.navy, display:"block", marginBottom:5 }}>Case Title *</label>
                <input style={inp} placeholder="e.g. Second Opinion Needed on Cardiac Diagnosis"
                  value={form.title} onChange={e => setForm(f=>({...f,title:e.target.value}))} />
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div>
                  <label style={{ fontSize:13, fontWeight:600, color:T.navy, display:"block", marginBottom:5 }}>Specialty / Category</label>
                  <select style={inp} value={form.category} onChange={e => setForm(f=>({...f,category:e.target.value}))}>
                    {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{ fontSize:13, fontWeight:600, color:T.navy, display:"block", marginBottom:5 }}>Priority</label>
                  <select style={inp} value={form.priority} onChange={e => setForm(f=>({...f,priority:e.target.value}))}>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                  </select>
                </div>
              </div>

              <div>
                <label style={{ fontSize:13, fontWeight:600, color:T.navy, display:"block", marginBottom:5 }}>Case Description *</label>
                <textarea style={{ ...inp, minHeight:140, resize:"vertical", lineHeight:1.65 }}
                  placeholder="Describe your medical situation in detail — symptoms, test results, current medications, your doctor's diagnosis, and any specific questions you want answered..."
                  value={form.content} onChange={e => setForm(f=>({...f,content:e.target.value}))} />
              </div>

              {/* ── DRAG-AND-DROP FILE ZONE ── */}
              <div>
                <label style={{ fontSize:13, fontWeight:600, color:T.navy, display:"block", marginBottom:7 }}>
                  Attachments <span style={{ color:T.muted, fontWeight:400 }}>(PDF or JPEG/JPG, max 25 MB each)</span>
                </label>
                <div
                  onDragOver={e => { e.preventDefault(); setDragging(true); }}
                  onDragLeave={() => setDragging(false)}
                  onDrop={handleDrop}
                  onClick={() => fileRef.current.click()}
                  style={{ border:`2px dashed ${dragging ? T.teal : T.border}`, borderRadius:10, padding:22, textAlign:"center", cursor:"pointer", background: dragging ? T.tealLight : "#FAFBFC", transition:"all .2s" }}>
                  <Upload size={26} color={T.teal} style={{ marginBottom:7 }}/>
                  <div style={{ color:T.navy, fontWeight:600, fontSize:14 }}>Drag & drop files here, or click to browse</div>
                  <div style={{ color:T.muted, fontSize:12, marginTop:3 }}>PDF, JPEG, JPG • Max 25 MB per file</div>
                  <input ref={fileRef} type="file" multiple accept=".pdf,.jpg,.jpeg" style={{ display:"none" }}
                    onChange={e => addFiles(e.target.files)} />
                </div>

                {/* Attachment list */}
                {attachments.length > 0 && (
                  <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:7 }}>
                    {attachments.map(a => (
                      <div key={a.id} style={{ display:"flex", alignItems:"center", gap:9, background:"#F8FAFC", border:`1px solid ${T.border}`, borderRadius:8, padding:"7px 11px" }}>
                        {a.preview
                          ? <img src={a.preview} alt="" style={{ width:34, height:34, objectFit:"cover", borderRadius:4 }}/>
                          : <div style={{ width:34, height:34, background:T.redBg, borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center" }}><FileText size={16} color={T.red}/></div>
                        }
                        <div style={{ flex:1, overflow:"hidden" }}>
                          <div style={{ fontSize:13, fontWeight:600, color:T.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{a.name}</div>
                          <div style={{ fontSize:11, color:T.muted }}>{fmtSize(a.size)} • {a.type.includes("pdf") ? "PDF Document" : "JPEG Image"}</div>
                        </div>
                        <button onClick={() => remove(a.id)} style={{ background:"none", border:"none", cursor:"pointer", color:T.muted }}><X size={14}/></button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Modal footer */}
            <div style={{ padding:"14px 26px", borderTop:`1px solid ${T.border}`, display:"flex", gap:9, justifyContent:"flex-end" }}>
              <button onClick={onClose} style={{ padding:"9px 20px", borderRadius:8, border:`1px solid ${T.border}`, background:"none", cursor:"pointer", color:T.muted, fontWeight:500 }}>Cancel</button>
              <button onClick={handleSave}
                style={{ padding:"9px 22px", borderRadius:8, border:"none", background:T.navy, color:"#fff", cursor:"pointer", fontWeight:700, fontSize:14, display:"flex", alignItems:"center", gap:6 }}>
                <Send size={13}/> {existingPost ? "Save Changes" : "Submit Case"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION 8 — COMMENT BLOCK
    // Every role (patient, doctor, admin) can:
    //   • Like or dislike any comment
    //   • Reply to any comment (flat threading, one level deep)
    //   • Edit / delete their own replies
    // Doctors & admins can additionally write top-level comments.
    // Only admins can delete the AI pre-screening comment.
    // ============================================================

    /* Small Like/Dislike button pair — reused on both posts and comments */
    function LikeBar({ likes=[], dislikes=[], userId, onLike, onDislike, small=false }) {
      const liked    = likes.includes(userId);
      const disliked = dislikes.includes(userId);
      const sz = small ? 12 : 13;
      const btn = (active, color, onClick, label, count) => (
        <button onClick={onClick}
          style={{ display:"flex", alignItems:"center", gap:3, padding: small ? "3px 8px" : "4px 10px",
            borderRadius:20, border:`1px solid ${active ? color : T.border}`,
            background: active ? color+"18" : "none", color: active ? color : T.muted,
            cursor:"pointer", fontSize:sz, fontWeight:600, transition:"all .15s" }}>
          <span style={{ fontSize:sz+1 }}>{label}</span> {count}
        </button>
      );
      return (
        <div style={{ display:"flex", gap:5, alignItems:"center" }}>
          {btn(liked,    "#16A34A", onLike,    "👍", likes.length)}
          {btn(disliked, "#DC2626", onDislike, "👎", dislikes.length)}
        </div>
      );
    }

    /* A single reply row — indented under its parent comment */
    function ReplyBlock({ reply, currentUser, onEditReply, onDeleteReply, onLikeReply, onDislikeReply }) {
      const [editing, setEditing] = useState(false);
      const [draft,   setDraft]   = useState(reply.content);
      const canEdit = currentUser.role === "admin" || currentUser.id === reply.authorId;
      const avatarBg = reply.role === "admin" ? "#5B21B6" : reply.role === "doctor" ? T.navy : T.teal;

      const save = () => { if (draft.trim()) { onEditReply(reply.id, draft); setEditing(false); } };

      return (
        <div style={{ display:"flex", gap:9, paddingTop:10, marginTop:4 }}>
          <Avatar initials={reply.authorName.split(" ").map(w=>w[0]).join("").slice(0,2)} size={28} bg={avatarBg}/>
          <div style={{ flex:1 }}>
            <div style={{ background:"#F8FAFC", border:`1px solid ${T.border}`, borderRadius:10, padding:"8px 12px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4, flexWrap:"wrap" }}>
                <span style={{ fontWeight:700, fontSize:13, color:T.navy }}>{reply.authorName}</span>
                <RoleBadge role={reply.role}/>
                <span style={{ fontSize:10, color:T.hint, marginLeft:"auto" }}>{fmtDate(reply.createdAt)}</span>
              </div>
              {editing ? (
                <>
                  <textarea value={draft} onChange={e=>setDraft(e.target.value)}
                    style={{ width:"100%", padding:"7px 10px", border:`1.5px solid ${T.teal}`, borderRadius:7,
                      fontSize:13, resize:"vertical", minHeight:60, outline:"none", color:T.text }} />
                  <div style={{ display:"flex", gap:6, marginTop:6 }}>
                    <button onClick={save} style={{ padding:"4px 12px", background:T.teal, color:"#fff", border:"none", borderRadius:5, cursor:"pointer", fontSize:12, fontWeight:600 }}>Save</button>
                    <button onClick={() => { setEditing(false); setDraft(reply.content); }} style={{ padding:"4px 10px", background:"none", border:`1px solid ${T.border}`, borderRadius:5, cursor:"pointer", fontSize:12, color:T.muted }}>Cancel</button>
                  </div>
                </>
              ) : (
                <p style={{ fontSize:13, color:T.text, lineHeight:1.65, margin:0 }}>{reply.content}</p>
              )}
            </div>
            {/* Like bar + edit/delete for replies */}
            <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:5, paddingLeft:4 }}>
              <LikeBar small likes={reply.likes||[]} dislikes={reply.dislikes||[]} userId={currentUser.id}
                onLike={onLikeReply} onDislike={onDislikeReply}/>
              {!editing && canEdit && (
                <>
                  <button onClick={() => setEditing(true)} style={{ background:"none", border:"none", cursor:"pointer", color:T.teal, fontSize:11, fontWeight:600, display:"flex", alignItems:"center", gap:2 }}>
                    <Edit2 size={10}/> Edit
                  </button>
                  <button onClick={() => onDeleteReply(reply.id)} style={{ background:"none", border:"none", cursor:"pointer", color:T.red, fontSize:11, fontWeight:600, display:"flex", alignItems:"center", gap:2 }}>
                    <Trash2 size={10}/> Delete
                  </button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    function CommentBlock({ comment, currentUser, onEdit, onDelete, onLike, onDislike,
                            onAddReply, onEditReply, onDeleteReply, onLikeReply, onDislikeReply }) {
      const [editing,    setEditing]    = useState(false);
      const [draft,      setDraft]      = useState(comment.content);
      const [replyOpen,  setReplyOpen]  = useState(false);
      const [replyText,  setReplyText]  = useState("");

      const isAI = comment.role === "ai";
      /* Admin-only for AI deletion; own comment for human deletion */
      const canDelete = isAI
        ? currentUser.role === "admin"
        : currentUser.role === "admin" || currentUser.id === comment.authorId;
      const canEdit   = !isAI && (currentUser.role === "admin" || currentUser.id === comment.authorId);

      const save = () => { if (draft.trim()) { onEdit(comment.id, draft.trim()); setEditing(false); } };

      const submitReply = () => {
        if (!replyText.trim()) return;
        onAddReply(comment.id, replyText.trim());
        setReplyText("");
        setReplyOpen(false);
      };

      const avatarBg = isAI ? "linear-gradient(135deg,#4338ca,#0B7A75)"
        : comment.role === "admin" ? "#5B21B6"
        : comment.role === "doctor" ? T.navy : T.teal;

      /* ── AI PANEL CARD — rich 5-assistant layout ── */
      if (isAI) {
        const AI_ASSISTANTS = [
          { emoji:"🟢", name:"ChatGPT",    brand:"OpenAI",          color:"#10A37F", bg:"#F0FDF9" },
          { emoji:"🟠", name:"Claude",     brand:"Anthropic",       color:"#D97706", bg:"#FFFBEB" },
          { emoji:"🔵", name:"Gemini",     brand:"Google DeepMind", color:"#1A73E8", bg:"#EFF6FF" },
          { emoji:"🟣", name:"Copilot",    brand:"Microsoft",       color:"#7C3AED", bg:"#F5F3FF" },
          { emoji:"⚡",  name:"Perplexity", brand:"Perplexity AI",  color:"#0891B2", bg:"#ECFEFF" },
        ];
        const extractText = (content, emoji, nextEmoji) => {
          const start = content.indexOf(emoji + " " + AI_ASSISTANTS.find(a=>a.emoji===emoji).name);
          if (start === -1) return null;
          const end = nextEmoji ? content.indexOf(nextEmoji, start + 1) : content.indexOf("─────");
          const block = content.slice(start, end > start ? end : undefined);
          const m = block.match(/   (.+)/s);
          return m ? m[1].trim() : null;
        };
        const texts = AI_ASSISTANTS.map((a,i) => ({
          ...a,
          text: extractText(comment.content, a.emoji, i < AI_ASSISTANTS.length-1 ? AI_ASSISTANTS[i+1].emoji : null),
        }));

        return (
          <div style={{ margin:"10px 0", border:"1.5px solid #C4B5FD", borderRadius:14, overflow:"hidden" }}>
            <div style={{ background:"linear-gradient(135deg,#4338ca,#0B7A75)", padding:"12px 18px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:32, height:32, borderRadius:"50%", background:"rgba(255,255,255,0.18)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, color:"#fff", fontSize:13 }}>AI</div>
                <div>
                  <div style={{ color:"#fff", fontWeight:700, fontSize:14 }}>MediSecond AI Pre-Screening Panel</div>
                  <div style={{ color:"rgba(255,255,255,0.68)", fontSize:11 }}>5 leading AI assistants reviewed your case • {fmtDate(comment.createdAt)}</div>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ background:"rgba(255,255,255,0.18)", border:"1px solid rgba(255,255,255,0.28)", borderRadius:20, padding:"3px 11px", fontSize:11, color:"#fff", fontWeight:600 }}>⚡ Instant AI</div>
                {/* Admin-only delete button on AI panel */}
                {currentUser.role === "admin" && (
                  <button onClick={() => onDelete(comment.id)}
                    style={{ background:"rgba(239,68,68,0.25)", border:"1px solid rgba(239,68,68,0.4)", color:"#FCA5A5", borderRadius:6, padding:"3px 10px", fontSize:11, fontWeight:600, cursor:"pointer" }}>
                    <Trash2 size={10} style={{ marginRight:3, display:"inline" }}/> Delete
                  </button>
                )}
              </div>
            </div>
            <div style={{ padding:14, background:"#FAFBFF", display:"flex", flexDirection:"column", gap:10 }}>
              {texts.map(ai => (
                <div key={ai.name} style={{ background:ai.bg, border:`1.5px solid ${ai.color}33`, borderRadius:10, padding:"12px 14px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:7 }}>
                    <span style={{ fontSize:15 }}>{ai.emoji}</span>
                    <span style={{ fontWeight:700, fontSize:13, color:ai.color }}>{ai.name}</span>
                    <span style={{ fontSize:11, color:T.muted }}>by {ai.brand}</span>
                  </div>
                  <p style={{ fontSize:13, color:"#1E293B", lineHeight:1.7, margin:0 }}>
                    {ai.text || "Analysis not available for this section."}
                  </p>
                </div>
              ))}
              <div style={{ background:"#FEF3C7", border:"1px solid #FCD34D", borderRadius:8, padding:"10px 14px", display:"flex", gap:8, alignItems:"flex-start" }}>
                <span style={{ fontSize:16, flexShrink:0 }}>⚠️</span>
                <p style={{ fontSize:12, color:"#92400E", margin:0, lineHeight:1.6 }}>
                  <strong>Important:</strong> The above represents automated AI perspectives only and does not constitute medical advice.
                  Please wait for a <strong>verified human specialist</strong> on this platform before taking any action.
                </p>
              </div>
            </div>
          </div>
        );
      }

      /* ── HUMAN COMMENT ── */
      return (
        <div style={{ padding:"14px 0", borderTop:`1px solid ${T.border}` }}>
          <div style={{ display:"flex", gap:11 }}>
            <Avatar initials={comment.authorName.split(" ").map(w=>w[0]).join("").slice(0,2)} size={34} bg={avatarBg}/>
            <div style={{ flex:1 }}>
              {/* Author row */}
              <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap", marginBottom:7 }}>
                <span style={{ fontWeight:700, fontSize:14, color:T.navy }}>{comment.authorName}</span>
                <RoleBadge role={comment.role}/>
                {comment.specialty && comment.specialty !== "Platform Administrator" && (
                  <span style={{ fontSize:12, color:T.muted }}>• {comment.specialty}</span>
                )}
                <span style={{ fontSize:11, color:T.hint, marginLeft:"auto" }}>{fmtDate(comment.createdAt)}</span>
              </div>

              {/* Content or edit textarea */}
              {editing ? (
                <div>
                  <textarea value={draft} onChange={e=>setDraft(e.target.value)}
                    style={{ width:"100%", padding:"9px 11px", border:`1.5px solid ${T.teal}`, borderRadius:8,
                      fontSize:14, resize:"vertical", minHeight:80, outline:"none", color:T.text }} />
                  <div style={{ display:"flex", gap:7, marginTop:7 }}>
                    <button onClick={save} style={{ padding:"5px 14px", background:T.teal, color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontSize:13, fontWeight:600 }}>Save</button>
                    <button onClick={() => { setEditing(false); setDraft(comment.content); }} style={{ padding:"5px 11px", background:"none", border:`1px solid ${T.border}`, borderRadius:6, cursor:"pointer", fontSize:13, color:T.muted }}>Cancel</button>
                  </div>
                </div>
              ) : (
                <p style={{ fontSize:14, color:T.text, lineHeight:1.72 }}>{comment.content}</p>
              )}

              {/* Action bar: likes + reply + edit/delete */}
              {!editing && (
                <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:8, flexWrap:"wrap" }}>
                  <LikeBar small likes={comment.likes||[]} dislikes={comment.dislikes||[]} userId={currentUser.id}
                    onLike={onLike} onDislike={onDislike}/>
                  {/* Reply button — ALL users can reply */}
                  <button onClick={() => setReplyOpen(!replyOpen)}
                    style={{ background:"none", border:"none", cursor:"pointer", color:T.teal, fontSize:12, fontWeight:600, display:"flex", alignItems:"center", gap:3 }}>
                    <MessageCircle size={11}/> Reply{(comment.replies||[]).length > 0 ? ` (${comment.replies.length})` : ""}
                  </button>
                  {canEdit && (
                    <button onClick={() => setEditing(true)} style={{ background:"none", border:"none", cursor:"pointer", color:T.muted, fontSize:12, fontWeight:600, display:"flex", alignItems:"center", gap:3 }}>
                      <Edit2 size={10}/> Edit
                    </button>
                  )}
                  {canDelete && (
                    <button onClick={() => onDelete(comment.id)} style={{ background:"none", border:"none", cursor:"pointer", color:T.red, fontSize:12, fontWeight:600, display:"flex", alignItems:"center", gap:3 }}>
                      <Trash2 size={10}/> Delete
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* ── REPLIES THREAD ── indented with a left border */}
          {(comment.replies||[]).length > 0 && (
            <div style={{ marginLeft:45, paddingLeft:12, borderLeft:`2px solid ${T.border}`, marginTop:4 }}>
              {comment.replies.map(r => (
                <ReplyBlock key={r.id} reply={r} currentUser={currentUser}
                  onEditReply={(rid,txt) => onEditReply(comment.id, rid, txt)}
                  onDeleteReply={rid => onDeleteReply(comment.id, rid)}
                  onLikeReply={() => onLikeReply(comment.id, r.id)}
                  onDislikeReply={() => onDislikeReply(comment.id, r.id)} />
              ))}
            </div>
          )}

          {/* ── REPLY INPUT — open when replyOpen is true ── */}
          {replyOpen && (
            <div style={{ marginLeft:45, marginTop:10, display:"flex", gap:8, alignItems:"flex-start" }}>
              <Avatar initials={currentUser.avatar} size={28}
                bg={currentUser.role==="admin"?"#5B21B6":currentUser.role==="doctor"?T.navy:T.teal}/>
              <div style={{ flex:1 }}>
                <textarea value={replyText} onChange={e=>setReplyText(e.target.value)}
                  placeholder={`Reply to ${comment.authorName}…`}
                  style={{ width:"100%", padding:"8px 11px", border:`1.5px solid ${T.border}`, borderRadius:8,
                    fontSize:13, resize:"vertical", minHeight:60, outline:"none", color:T.text }}
                  onFocus={e=>e.target.style.borderColor=T.teal}
                  onBlur={e=>e.target.style.borderColor=T.border} />
                <div style={{ display:"flex", gap:7, justifyContent:"flex-end", marginTop:6 }}>
                  <button onClick={() => { setReplyOpen(false); setReplyText(""); }}
                    style={{ padding:"5px 12px", background:"none", border:`1px solid ${T.border}`, borderRadius:6, cursor:"pointer", fontSize:12, color:T.muted }}>
                    Cancel
                  </button>
                  <button onClick={submitReply}
                    style={{ padding:"5px 14px", background:T.teal, color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", gap:4 }}>
                    <Send size={11}/> Reply
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // SECTION 9 — POST CARD
    // Every role can like/dislike posts. All roles can comment.
    // Doctors/admins write top-level opinions; patients write
    // replies AND top-level comments too (multi-way conversation).
    // ============================================================

    function PostCard({ post, currentUser, onEdit, onDelete,
                        onComment, onEditComment, onDeleteComment,
                        onLikePost, onDislikePost,
                        onLikeComment, onDislikeComment,
                        onAddReply, onEditReply, onDeleteReply,
                        onLikeReply, onDislikeReply }) {
      const [expanded,     setExpanded]     = useState(false);
      const [commentText,  setCommentText]  = useState("");
      const [viewFile,     setViewFile]     = useState(null);

      const canEdit   = currentUser.role === "admin" || currentUser.id === post.authorId;
      const canDelete = currentUser.role === "admin" || currentUser.id === post.authorId;
      const pri = priorityBadge(post.priority);
      const sta = statusBadge(post.status);
      const isAdminPost = post.authorId.startsWith("u-admin");

      /* All roles can comment — patients can participate in their own case discussion */
      const submitComment = () => {
        if (!commentText.trim()) return;
        onComment(post.id, commentText.trim());
        setCommentText("");
      };

      /* Count all comments including AI */
      const totalComments = (post.comments||[]).length +
        (post.comments||[]).reduce((s,c) => s + (c.replies||[]).length, 0);

      return (
        <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:14, overflow:"hidden", marginBottom:14 }}>
          {/* ── Header ── */}
          <div style={{ padding:"18px 22px" }}>
            <div style={{ display:"flex", gap:11, alignItems:"flex-start", marginBottom:11 }}>
              <Avatar initials={post.authorName.split(" ").map(w=>w[0]).join("").slice(0,2)}
                size={38} bg={isAdminPost ? "#5B21B6" : T.navy}/>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap", marginBottom:4 }}>
                  <span style={{ fontWeight:700, fontSize:14, color:T.navy }}>{post.authorName}</span>
                  <RoleBadge role={isAdminPost ? "admin" : "patient"}/>
                  <span style={{ fontSize:11, color:T.hint, marginLeft:"auto" }}>{fmtDate(post.createdAt)}</span>
                </div>
                <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                  <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20, background:T.tealLight, color:T.teal, fontWeight:600 }}>{post.category}</span>
                  <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20, background:sta.bg, color:sta.color, fontWeight:600 }}>{sta.label}</span>
                  <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20, background:pri.bg, color:pri.color, fontWeight:600 }}>{pri.label}</span>
                </div>
              </div>
            </div>

            <h3 style={{ fontSize:16, fontWeight:700, color:T.navy, marginBottom:9, lineHeight:1.35 }}>{post.title}</h3>

            <p style={{ fontSize:14, color:T.text, lineHeight:1.75, marginBottom:10 }}>
              {expanded ? post.content : (post.content.length > 220 ? post.content.slice(0,220) + "…" : post.content)}
            </p>
            {post.content.length > 220 && (
              <button onClick={() => setExpanded(!expanded)} style={{ background:"none", border:"none", color:T.teal, cursor:"pointer", fontSize:13, fontWeight:600, padding:0 }}>
                {expanded ? "Show Less" : "Read Full Case"}
              </button>
            )}

            {/* Attachments */}
            {post.attachments && post.attachments.length > 0 && (
              <div style={{ marginTop:11, display:"flex", flexWrap:"wrap", gap:7 }}>
                {post.attachments.map(raw => {
                  const a = normaliseAttachment(raw);
                  return (
                    <div key={a.id}
                      onClick={() => a.preview && setViewFile(a)}
                      title={a.preview ? (a.isImage ? "Click to view image" : "Click to open PDF") : ""}
                      style={{ display:"flex", alignItems:"center", gap:6, background:"#F8FAFC",
                        border:`1.5px solid ${a.preview ? T.teal+"66" : T.border}`, borderRadius:8,
                        padding:"5px 9px", cursor:a.preview ? "pointer" : "default", transition:"all .15s" }}
                      onMouseEnter={e=>{ if(a.preview) e.currentTarget.style.background=T.tealLight; }}
                      onMouseLeave={e=>{ e.currentTarget.style.background="#F8FAFC"; }}>
                      {a.isImage
                        ? <img src={a.preview} alt="" style={{ width:28, height:28, objectFit:"cover", borderRadius:4 }}/>
                        : <FileText size={13} color={T.red}/>}
                      <div>
                        <div style={{ fontSize:11, fontWeight:600, color:T.navy, maxWidth:130, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{a.name}</div>
                        <div style={{ fontSize:10, color:T.muted }}>{fmtSize(a.size)}{a.preview ? " • tap to view" : ""}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {viewFile && <FileViewer file={viewFile} onClose={() => setViewFile(null)}/>}

            {/* ── ACTION ROW: likes + comments + edit/delete ── */}
            <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:12, paddingTop:11, borderTop:`1px solid ${T.border}`, flexWrap:"wrap" }}>
              {/* Like/Dislike on the post itself */}
              <LikeBar likes={post.likes||[]} dislikes={post.dislikes||[]} userId={currentUser.id}
                onLike={() => onLikePost(post.id)} onDislike={() => onDislikePost(post.id)}/>

              <button onClick={() => setExpanded(!expanded)}
                style={{ display:"flex", alignItems:"center", gap:5, background:"none", border:"none", color:T.muted, cursor:"pointer", fontSize:13 }}>
                <MessageCircle size={13}/> {totalComments} {totalComments===1?"comment":"comments"}
              </button>

              <div style={{ marginLeft:"auto", display:"flex", gap:7 }}>
                {canEdit && (
                  <button onClick={() => onEdit(post)}
                    style={{ display:"flex", alignItems:"center", gap:4, padding:"5px 11px", background:T.tealLight, color:T.teal, border:"none", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600 }}>
                    <Edit2 size={11}/> Edit
                  </button>
                )}
                {canDelete && (
                  <button onClick={() => onDelete(post.id)}
                    style={{ display:"flex", alignItems:"center", gap:4, padding:"5px 11px", background:T.redBg, color:T.red, border:"none", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600 }}>
                    <Trash2 size={11}/> Delete
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* ── COMMENTS + REPLIES (shown when expanded) ── */}
          {expanded && (
            <div style={{ padding:"0 22px 18px", borderTop:`1px solid ${T.border}` }}>
              <h4 style={{ fontSize:12, fontWeight:700, color:T.navy, padding:"14px 0 3px", textTransform:"uppercase", letterSpacing:"0.05em" }}>
                Discussion ({totalComments})
              </h4>

              {(post.comments||[]).length === 0 && (
                <div style={{ textAlign:"center", padding:"22px 0", color:T.muted, fontSize:14 }}>
                  <MessageCircle size={26} color={T.border} style={{ display:"block", margin:"0 auto 7px" }}/>
                  No responses yet. Be the first to comment or wait for a specialist.
                </div>
              )}

              {(post.comments||[]).map(c => (
                <CommentBlock key={c.id} comment={c} currentUser={currentUser}
                  onEdit={(cid,txt)   => onEditComment(post.id, cid, txt)}
                  onDelete={cid       => onDeleteComment(post.id, cid)}
                  onLike={()          => onLikeComment(post.id, c.id)}
                  onDislike={()       => onDislikeComment(post.id, c.id)}
                  onAddReply={(cid,txt)     => onAddReply(post.id, cid, txt)}
                  onEditReply={(cid,rid,txt) => onEditReply(post.id, cid, rid, txt)}
                  onDeleteReply={(cid,rid)   => onDeleteReply(post.id, cid, rid)}
                  onLikeReply={(cid,rid)     => onLikeReply(post.id, cid, rid)}
                  onDislikeReply={(cid,rid)  => onDislikeReply(post.id, cid, rid)} />
              ))}

              {/* ── COMMENT INPUT — open to ALL roles ── */}
              <div style={{ marginTop:16, display:"flex", gap:9, alignItems:"flex-start" }}>
                <Avatar initials={currentUser.avatar} size={34}
                  bg={currentUser.role==="admin"?"#5B21B6":currentUser.role==="doctor"?T.navy:T.teal}/>
                <div style={{ flex:1 }}>
                  <textarea value={commentText} onChange={e=>setCommentText(e.target.value)}
                    placeholder={currentUser.role==="patient"
                      ? "Write a comment or ask a follow-up question…"
                      : "Write your clinical opinion here…"}
                    style={{ width:"100%", padding:"9px 13px", border:`1.5px solid ${T.border}`, borderRadius:8,
                      fontSize:14, resize:"vertical", minHeight:78, outline:"none", color:T.text }}
                    onFocus={e=>e.target.style.borderColor=T.teal}
                    onBlur={e=>e.target.style.borderColor=T.border}/>
                  <div style={{ display:"flex", justifyContent:"flex-end", marginTop:7 }}>
                    <button onClick={submitComment}
                      style={{ padding:"7px 16px", background:T.teal, color:"#fff", border:"none", borderRadius:7, cursor:"pointer", fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:5 }}>
                      <Send size={12}/> {currentUser.role==="patient" ? "Post Comment" : "Post Opinion"}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // SECTION 10a — AI PRE-SCREENING ENGINE (no API key needed)
    // I generate an immediate "panel" of 5 AI assistant responses
    // the moment a patient submits a post. These are intelligently
    // templated based on the post category and detected keywords,
    // so they feel relevant rather than generic.
    // The 5 AI systems represented: ChatGPT, Claude, Gemini,
    // Microsoft Copilot, and Perplexity AI.
    // ============================================================

    /* Category-specific clinical context lookup */
    const CAT_CTX = {
      Cardiology:      { adj:"cardiovascular",    flag:"chest pain, syncope, or acute breathlessness",       focus:"cardiac risk factors, ECG changes, and echocardiographic findings" },
      Neurology:       { adj:"neurological",      flag:"sudden severe headache, facial droop, or limb weakness", focus:"symptom chronology, imaging findings, and neurological deficits" },
      Oncology:        { adj:"oncological",       flag:"rapid weight loss, unexplained bleeding, or severe fatigue", focus:"histopathology results, staging, and prior treatment history" },
      Orthopaedics:    { adj:"musculoskeletal",   flag:"acute instability, neurovascular compromise, or compartment signs", focus:"mechanism of injury, imaging, and functional limitation" },
      Radiology:       { adj:"radiological",      flag:"mass lesions with irregular margins or unexpected enhancement", focus:"imaging modality, sequences used, and comparison with prior studies" },
      "General Medicine":{ adj:"clinical",        flag:"high fever, altered consciousness, or unexplained weight loss", focus:"symptom onset, duration, associated features, and baseline investigations" },
      Endocrinology:   { adj:"endocrinological",  flag:"severe hypoglycaemia, adrenal crisis, or thyroid storm signs", focus:"hormone levels, medication history, and metabolic panel results" },
      Gastroenterology:{ adj:"gastrointestinal",  flag:"haematemesis, melena, or acute abdominal rigidity",  focus:"symptom pattern, prior endoscopy results, and dietary history" },
      Psychiatry:      { adj:"psychiatric",       flag:"active suicidal ideation or acute psychotic symptoms",focus:"symptom duration, psychiatric history, and current medications" },
      Announcement:    { adj:"clinical",          flag:"any urgent or time-sensitive elements",              focus:"clarity and completeness of the information presented" },
      Other:           { adj:"medical",           flag:"any red-flag or urgent symptoms",                    focus:"complete symptom history, investigations, and clinical timeline" },
    };

    /* Extract a short meaningful phrase from the post content to personalise responses */
    const extractSnippet = content => {
      const sentences = content.split(/[.!?]/).map(s=>s.trim()).filter(s=>s.length>20);
      return sentences.length > 0 ? sentences[0].slice(0,90) + "…" : content.slice(0,90) + "…";
    };

    /* Main generator — returns a structured comment content string that
       formats as a beautiful multi-card AI panel inside CommentBlock */
    const generateAIPanel = post => {
      const ctx  = CAT_CTX[post.category] || CAT_CTX.Other;
      const snip = extractSnippet(post.content);

      /* Each AI assistant has a distinct "voice" and analytical angle */
      const responses = [
        {
          name:"ChatGPT",    brand:"OpenAI",             emoji:"🟢",
          angle:"Evidence-based synthesis",
          text:`Based on the ${ctx.adj} presentation described ("${snip}"), this case warrants careful specialist evaluation. I would focus on ${ctx.focus}. If you experience ${ctx.flag}, seek emergency care immediately.`,
        },
        {
          name:"Claude",     brand:"Anthropic",          emoji:"🟠",
          angle:"Nuanced clinical reasoning",
          text:`Reading through your case, the ${ctx.adj} details you have shared provide a reasonable clinical picture. Key considerations include ${ctx.focus}. I would strongly recommend bringing all relevant investigation reports to your follow-up appointment.`,
        },
        {
          name:"Gemini",     brand:"Google DeepMind",    emoji:"🔵",
          angle:"Differential & risk framing",
          text:`This ${post.category} presentation raises several important clinical differentials. Prioritising ${ctx.focus} will help narrow the diagnosis. Watch carefully for ${ctx.flag} — these would require prompt escalation.`,
        },
        {
          name:"Copilot",    brand:"Microsoft",          emoji:"🟣",
          angle:"Patient-centred guidance",
          text:`I understand your concern about this ${ctx.adj} situation. My recommendation is to ensure your specialist has complete documentation covering ${ctx.focus}. Maintaining a symptom diary between appointments can also provide valuable clinical context.`,
        },
        {
          name:"Perplexity", brand:"Perplexity AI",      emoji:"⚡",
          angle:"Information synthesis",
          text:`Synthesising current clinical literature on this ${post.category} presentation: the information you have provided — particularly around ${ctx.focus} — is consistent with several documented clinical pathways. A structured specialist assessment remains the most reliable next step.`,
        },
      ];

      /* Build the formatted text. CommentBlock renders this as plain text,
         so I use unicode symbols and dashes to create visual structure. */
      const lines = [
        "┌─────────────────────────────────────────────────────────┐",
        "│  ⚡ AI PRE-SCREENING PANEL — 5 Leading AI Assistants    │",
        "│  Automated analysis · Not a substitute for specialist   │",
        "└─────────────────────────────────────────────────────────┘",
        "",
        ...responses.flatMap(r => [
          `${r.emoji} ${r.name} (${r.brand}) — ${r.angle}`,
          `   ${r.text}`,
          "",
        ]),
        "─────────────────────────────────────────────────────────────",
        "⚠  IMPORTANT: The above represents automated AI perspectives",
        "   only. Please wait for a verified human specialist on this",
        "   platform to review your case before taking any action.",
        "   AI pre-screening does not constitute medical advice.",
      ];

      return lines.join("\n");
    };

    // ============================================================
    // SECTION 10 — DASHBOARD
    // Main authenticated layout: fixed sidebar + scrollable
    // content area. Sidebar items vary by role.
    // ============================================================

    function Dashboard({ currentUser, users, posts, setPosts, onLogout, onGoProfile,
                         notifications, setNotifications, addNotification }) {
      const [view, setView]           = useState("posts");
      const [search, setSearch]       = useState("");
      const [filterCat, setFilterCat] = useState("All");
      const [showCreate, setShowCreate] = useState(false);
      const [editPost, setEditPost]   = useState(null);
      /* dropdown controls the avatar menu in the top-right */
      const [dropdown, setDropdown]   = useState(false);
      /* bellOpen controls the notifications dropdown */
      const [bellOpen, setBellOpen]   = useState(false);
      const dropRef = useRef();
      const bellRef = useRef();

      /* Close dropdowns when clicking outside */
      useEffect(() => {
        const handler = e => {
          if (dropRef.current && !dropRef.current.contains(e.target)) setDropdown(false);
          if (bellRef.current && !bellRef.current.contains(e.target)) setBellOpen(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      /* My notifications — only show ones addressed to the current user */
      const myNotifs  = notifications.filter(n => n.forUserId === currentUser.id);
      const unreadCnt = myNotifs.filter(n => !n.isRead).length;

      /* Mark all as read when the bell is opened */
      const openBell = () => {
        setBellOpen(b => !b);
        setNotifications(prev => prev.map(n =>
          n.forUserId === currentUser.id ? { ...n, isRead: true } : n
        ));
      };

      // ── Role-based post visibility ──────────────────────────
      // Patients see ONLY their own posts — privacy is enforced here.
      // Doctors and admins see everything.
      const visiblePosts = posts.filter(p => {
        if (currentUser.role === "patient" && p.authorId !== currentUser.id) return false;
        if (filterCat !== "All" && p.category !== filterCat) return false;
        if (search && !p.title.toLowerCase().includes(search.toLowerCase()) &&
            !p.content.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      }).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

      // ── POST CRUD & INTERACTION HANDLERS ────────────────────

      const handleCreatePost = formData => {
        const newPost = {
          id:"p-"+Date.now(), authorId:currentUser.id, authorName:currentUser.name,
          title:formData.title, content:formData.content,
          category:formData.category, priority:formData.priority,
          status:"pending", createdAt:new Date().toISOString(),
          attachments:formData.attachments||[], likes:[], dislikes:[], comments:[],
        };
        const commentsToAdd = [];
        if (currentUser.role === "patient") {
          commentsToAdd.push({
            id:"c-ai-"+Date.now(), authorId:"ai", authorName:"MediSecond AI",
            role:"ai", specialty:"AI Pre-Screening", content:generateAIPanel(newPost),
            createdAt:new Date().toISOString(), likes:[], dislikes:[], replies:[],
          });
        }
        setPosts(prev => [{ ...newPost, comments:commentsToAdd }, ...prev]);
        setShowCreate(false);
        if (currentUser.role === "patient") {
          users.filter(u=>u.role==="doctor"||u.role==="admin").forEach(u => {
            addNotification({ forUserId:u.id, type:"new_post", icon:"📋",
              message:`New ${formData.category} case: "${formData.title.slice(0,50)}"`,
              postTitle:formData.title, postId:newPost.id, isRead:false });
          });
        }
      };

      const handleEditPost = formData => {
        setPosts(prev => prev.map(p =>
          p.id===editPost.id
            ? {...p, title:formData.title, content:formData.content,
               category:formData.category, priority:formData.priority,
               attachments:formData.attachments||p.attachments}
            : p
        ));
        setEditPost(null);
      };

      const handleDeletePost = id => {
        if (window.confirm("Delete this case post permanently?"))
          setPosts(prev => prev.filter(p => p.id!==id));
      };

      /* Toggle helper — add userId if absent, remove if present */
      const toggle = (arr, uid) => (arr||[]).includes(uid)
        ? (arr||[]).filter(x=>x!==uid) : [...(arr||[]), uid];

      const handleLikePost = postId => {
        const post = posts.find(p=>p.id===postId);
        if (!post) return;
        const alreadyLiked = (post.likes||[]).includes(currentUser.id);
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, likes:toggle(p.likes, currentUser.id),
          dislikes:(p.dislikes||[]).filter(x=>x!==currentUser.id) }));
        if (!alreadyLiked && post.authorId!==currentUser.id)
          addNotification({ forUserId:post.authorId, type:"like", icon:"👍",
            message:`${currentUser.name} liked your post`,
            postTitle:post.title, postId, isRead:false });
      };
      const handleDislikePost = postId => {
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, dislikes:toggle(p.dislikes, currentUser.id),
          likes:(p.likes||[]).filter(x=>x!==currentUser.id) }));
      };

      // ── COMMENT CRUD ──────────────────────────────────────────

      const handleComment = (postId, text) => {
        const post = posts.find(p=>p.id===postId);
        const nc = {
          id:"c-"+Date.now(), authorId:currentUser.id,
          authorName:currentUser.name, role:currentUser.role,
          specialty:currentUser.specialty||"", content:text,
          createdAt:new Date().toISOString(), likes:[], dislikes:[], replies:[],
        };
        setPosts(prev => prev.map(p => p.id!==postId ? p :
          { ...p, status:"responded", comments:[...p.comments, nc] }));
        if (post && post.authorId!==currentUser.id)
          addNotification({ forUserId:post.authorId, type:"comment", icon:"💬",
            message:`${currentUser.name} commented on your post`,
            postTitle:post.title, postId, isRead:false });
        /* Notify all other participants except self, post author, and AI */
        if (post) {
          const notified = new Set([currentUser.id, post.authorId, "ai"]);
          post.comments.forEach(c => {
            if (!notified.has(c.authorId)) {
              notified.add(c.authorId);
              addNotification({ forUserId:c.authorId, type:"comment", icon:"💬",
                message:`${currentUser.name} also commented on "${post.title.slice(0,40)}…"`,
                postTitle:post.title, postId, isRead:false });
            }
          });
        }
      };
      const handleEditComment = (postId, commentId, newText) => {
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.map(c=>c.id===commentId?{...c,content:newText}:c) }));
      };
      const handleDeleteComment = (postId, commentId) => {
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.filter(c=>c.id!==commentId) }));
      };
      const handleLikeComment = (postId, commentId) => {
        const post = posts.find(p=>p.id===postId);
        const comment = post?.comments.find(c=>c.id===commentId);
        const alreadyLiked = (comment?.likes||[]).includes(currentUser.id);
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.map(c => c.id!==commentId ? c : {
            ...c, likes:toggle(c.likes, currentUser.id),
            dislikes:(c.dislikes||[]).filter(x=>x!==currentUser.id) }) }));
        if (!alreadyLiked && comment && comment.authorId!==currentUser.id)
          addNotification({ forUserId:comment.authorId, type:"like", icon:"👍",
            message:`${currentUser.name} liked your comment`,
            postTitle:post.title, postId, isRead:false });
      };
      const handleDislikeComment = (postId, commentId) => {
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.map(c => c.id!==commentId ? c : {
            ...c, dislikes:toggle(c.dislikes, currentUser.id),
            likes:(c.likes||[]).filter(x=>x!==currentUser.id) }) }));
      };

      // ── REPLY CRUD ────────────────────────────────────────────

      const handleAddReply = (postId, commentId, text) => {
        const post    = posts.find(p=>p.id===postId);
        const comment = post?.comments.find(c=>c.id===commentId);
        const nr = {
          id:"r-"+Date.now(), authorId:currentUser.id,
          authorName:currentUser.name, role:currentUser.role,
          content:text, createdAt:new Date().toISOString(), likes:[], dislikes:[],
        };
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.map(c => c.id!==commentId ? c :
            { ...c, replies:[...(c.replies||[]), nr] }) }));
        if (comment && comment.authorId!==currentUser.id)
          addNotification({ forUserId:comment.authorId, type:"reply", icon:"↩️",
            message:`${currentUser.name} replied to your comment`,
            postTitle:post?.title||"", postId, isRead:false });
        if (post && post.authorId!==currentUser.id && post.authorId!==comment?.authorId)
          addNotification({ forUserId:post.authorId, type:"reply", icon:"↩️",
            message:`${currentUser.name} replied in your post discussion`,
            postTitle:post.title, postId, isRead:false });
      };
      const handleEditReply = (postId, commentId, replyId, newText) => {
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.map(c => c.id!==commentId ? c : {
            ...c, replies:(c.replies||[]).map(r=>r.id===replyId?{...r,content:newText}:r) }) }));
      };
      const handleDeleteReply = (postId, commentId, replyId) => {
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.map(c => c.id!==commentId ? c : {
            ...c, replies:(c.replies||[]).filter(r=>r.id!==replyId) }) }));
      };
      const handleLikeReply = (postId, commentId, replyId) => {
        const post    = posts.find(p=>p.id===postId);
        const comment = post?.comments.find(c=>c.id===commentId);
        const reply   = comment?.replies?.find(r=>r.id===replyId);
        const alreadyLiked = (reply?.likes||[]).includes(currentUser.id);
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.map(c => c.id!==commentId ? c : {
            ...c, replies:(c.replies||[]).map(r => r.id!==replyId ? r : {
              ...r, likes:toggle(r.likes, currentUser.id),
              dislikes:(r.dislikes||[]).filter(x=>x!==currentUser.id) }) }) }));
        if (!alreadyLiked && reply && reply.authorId!==currentUser.id)
          addNotification({ forUserId:reply.authorId, type:"like", icon:"👍",
            message:`${currentUser.name} liked your reply`,
            postTitle:post?.title||"", postId, isRead:false });
      };
      const handleDislikeReply = (postId, commentId, replyId) => {
        setPosts(prev => prev.map(p => p.id!==postId ? p : {
          ...p, comments:p.comments.map(c => c.id!==commentId ? c : {
            ...c, replies:(c.replies||[]).map(r => r.id!==replyId ? r : {
              ...r, dislikes:toggle(r.dislikes, currentUser.id),
              likes:(r.likes||[]).filter(x=>x!==currentUser.id) }) }) }));
      };

      // ── SIDEBAR NAV ITEMS (role-aware) ──────────────────────
      const navItems = [
        { key:"posts",   label:"Case Feed",   icon:<FileText size={17}/> },
        { key:"profile", label:"My Profile",  icon:<User size={17}/> },
        ...(currentUser.role==="admin" ? [
          { key:"admin", label:"Admin Panel", icon:<Shield size={17}/> },
          { key:"users", label:"Users",       icon:<Users size={17}/> },
        ] : []),
        ...(currentUser.role==="doctor" ? [
          { key:"stats", label:"My Activity", icon:<Activity size={17}/> },
        ] : []),
      ];

      // ── Stats for admin and doctor views ────────────────────
      const pendingCount  = posts.filter(p=>p.status==="pending").length;
      const totalPatients = users.filter(u=>u.role==="patient").length;
      const totalDoctors  = users.filter(u=>u.role==="doctor").length;

      return (
        <div style={{ display:"flex", minHeight:"100vh", background:T.bg }}>

          {/* ━━━ SIDEBAR ━━━ */}
          <div style={{ width:224, flexShrink:0, background:T.navy, display:"flex", flexDirection:"column", position:"sticky", top:0, height:"100vh", overflowY:"auto" }}>
            {/* Logo */}
            <div style={{ padding:"18px 18px 14px", borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:30, height:30, background:T.teal, borderRadius:7, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <Stethoscope size={15} color="#fff"/>
                </div>
                <span style={{ color:"#fff", fontFamily:"'DM Serif Display',serif", fontSize:17 }}>
                  Medi<span style={{ color:"#4DD9D0" }}>Second</span>
                </span>
              </div>
            </div>

            {/* Logged-in user chip */}
            <div style={{ padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                <Avatar initials={currentUser.avatar} size={36}
                  bg={currentUser.role==="admin" ? "#5B21B6" : currentUser.role==="doctor" ? T.teal : T.amber}/>
                <div>
                  <div style={{ color:"#fff", fontSize:13, fontWeight:700, lineHeight:1.3 }}>{currentUser.name}</div>
                  <RoleBadge role={currentUser.role}/>
                </div>
              </div>
            </div>

            {/* Navigation */}
            <nav style={{ flex:1, padding:"10px 9px" }}>
              {navItems.map(n => (
                <button key={n.key} onClick={() => setView(n.key)}
                  style={{ width:"100%", display:"flex", alignItems:"center", gap:9, padding:"9px 11px", borderRadius:8, border:"none", cursor:"pointer", marginBottom:2, textAlign:"left", fontSize:13, fontWeight:600,
                    background: view===n.key ? "rgba(77,217,208,0.14)" : "transparent",
                    color:      view===n.key ? "#4DD9D0" : "rgba(255,255,255,0.58)" }}>
                  {n.icon} {n.label}
                </button>
              ))}
            </nav>

            <div style={{ padding:"0 9px 18px" }}>
              <button onClick={onLogout}
                style={{ width:"100%", display:"flex", alignItems:"center", gap:9, padding:"9px 11px", borderRadius:8, border:"none", cursor:"pointer", background:"transparent", color:"rgba(255,255,255,0.38)", fontSize:13, fontWeight:600 }}>
                <LogOut size={16}/> Log Out
              </button>
            </div>
          </div>

          {/* ━━━ MAIN CONTENT ━━━ */}
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>

            {/* Top bar */}
            <div style={{ background:T.surface, borderBottom:`1px solid ${T.border}`, padding:"13px 26px", display:"flex", alignItems:"center", gap:13 }}>
              <div style={{ flex:1 }}>
                <h1 style={{ fontSize:17, fontWeight:700, color:T.navy }}>
                  {view==="posts" ? "Case Feed" : view==="profile" ? "My Profile" : view==="admin" ? "Admin Panel" : view==="users" ? "User Management" : "My Activity"}
                </h1>
                <p style={{ fontSize:11, color:T.muted, marginTop:1 }}>
                  {currentUser.role==="patient" && "Your submitted cases — private to doctors and admins only."}
                  {currentUser.role==="doctor"  && "All patient cases awaiting specialist review."}
                  {currentUser.role==="admin"   && "Full platform overview and management tools."}
                </p>
              </div>

              {/* ── BELL NOTIFICATIONS ──
                  I wrap the bell in a relative container and render the
                  dropdown card absolutely below it. A click-outside
                  useEffect (above) closes it when clicking elsewhere.
                  The red badge shows the unread count. */}
              <div ref={bellRef} style={{ position:"relative" }}>
                <button onClick={openBell}
                  style={{ background:"none", border:"none", cursor:"pointer", position:"relative", padding:4, display:"flex", alignItems:"center" }}>
                  <Bell size={18} color={unreadCnt > 0 ? T.navy : T.muted}/>
                  {/* Unread count badge — only visible when there are unread notifications */}
                  {unreadCnt > 0 && (
                    <span style={{ position:"absolute", top:0, right:0, width:16, height:16,
                      background:"#EF4444", borderRadius:"50%", display:"flex", alignItems:"center",
                      justifyContent:"center", fontSize:9, fontWeight:800, color:"#fff", border:"2px solid #fff" }}>
                      {unreadCnt > 9 ? "9+" : unreadCnt}
                    </span>
                  )}
                </button>

                {bellOpen && (
                  <div style={{ position:"absolute", top:"calc(100% + 8px)", right:0, width:340,
                    background:T.surface, border:`1px solid ${T.border}`, borderRadius:12,
                    boxShadow:"0 8px 28px rgba(0,0,0,0.13)", zIndex:150, overflow:"hidden" }}>
                    {/* Bell dropdown header */}
                    <div style={{ padding:"13px 16px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <span style={{ fontSize:14, fontWeight:700, color:T.navy }}>Notifications</span>
                      {myNotifs.length > 0 && (
                        <button onClick={() => setNotifications(prev => prev.map(n => n.forUserId===currentUser.id ? {...n,isRead:true} : n))}
                          style={{ fontSize:12, color:T.teal, background:"none", border:"none", cursor:"pointer", fontWeight:600 }}>
                          Mark all read
                        </button>
                      )}
                    </div>
                    {/* Notification list */}
                    <div style={{ maxHeight:360, overflowY:"auto" }}>
                      {myNotifs.length === 0 ? (
                        <div style={{ padding:"28px 16px", textAlign:"center", color:T.muted, fontSize:13 }}>
                          <Bell size={28} color={T.border} style={{ display:"block", margin:"0 auto 8px" }}/>
                          No notifications yet
                        </div>
                      ) : myNotifs.map(n => (
                        <div key={n.id}
                          style={{ padding:"12px 16px", borderBottom:`1px solid ${T.border}`,
                            background: n.isRead ? "transparent" : T.tealLight,
                            display:"flex", gap:11, alignItems:"flex-start" }}>
                          {/* Icon bubble — uses the icon emoji field on the notification */}
                          <div style={{ width:34, height:34, borderRadius:"50%", flexShrink:0,
                            background: n.type==="like"?"#FEF3C7": n.type==="reply"?"#EDE9FE": n.type==="comment"?"#DBEAFE":"#D1FAE5",
                            display:"flex", alignItems:"center", justifyContent:"center", fontSize:15 }}>
                            {n.icon || (n.type==="comment"?"💬":n.type==="like"?"👍":n.type==="reply"?"↩️":"📋")}
                          </div>
                          <div style={{ flex:1, overflow:"hidden" }}>
                            <div style={{ fontSize:13, fontWeight:600, color:T.navy, marginBottom:2 }}>{n.message}</div>
                            <div style={{ fontSize:11, color:T.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{n.postTitle}</div>
                            <div style={{ fontSize:11, color:T.hint, marginTop:3 }}>{fmtDate(n.createdAt)}</div>
                          </div>
                          {/* Unread dot */}
                          {!n.isRead && (
                            <div style={{ width:8, height:8, borderRadius:"50%", background:"#EF4444", flexShrink:0, marginTop:4 }}/>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* ── AVATAR DROPDOWN ── */}
              <div ref={dropRef} style={{ position:"relative" }}>
                <button
                  onClick={() => setDropdown(!dropdown)}
                  style={{ background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", gap:6 }}
                  title={currentUser.name}>
                  <Avatar initials={currentUser.avatar} size={34}
                    bg={currentUser.role==="admin" ? "#5B21B6" : currentUser.role==="doctor" ? T.teal : T.amber}/>
                  <svg width="10" height="6" viewBox="0 0 10 6">
                    <path d={dropdown ? "M9 5 5 1 1 5" : "M1 1 5 5 9 1"} stroke={T.muted} strokeWidth="1.5" strokeLinecap="round" fill="none"/>
                  </svg>
                </button>

                {dropdown && (
                  <div style={{ position:"absolute", top:"calc(100% + 8px)", right:0, width:220,
                    background:T.surface, border:`1px solid ${T.border}`, borderRadius:12,
                    boxShadow:"0 8px 24px rgba(0,0,0,0.12)", zIndex:150, overflow:"hidden" }}>
                    <div style={{ padding:"14px 16px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", gap:10 }}>
                      <Avatar initials={currentUser.avatar} size={38}
                        bg={currentUser.role==="admin" ? "#5B21B6" : currentUser.role==="doctor" ? T.teal : T.amber}/>
                      <div>
                        <div style={{ fontSize:13, fontWeight:700, color:T.navy, lineHeight:1.3 }}>{currentUser.name}</div>
                        <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{currentUser.email}</div>
                      </div>
                    </div>
                    <div style={{ padding:"6px 0" }}>
                      <button onClick={() => { setView("profile"); setDropdown(false); }}
                        style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 16px", border:"none", background:"none", cursor:"pointer", fontSize:13, color:T.text, textAlign:"left", fontWeight:500 }}
                        onMouseEnter={e=>e.currentTarget.style.background=T.bg}
                        onMouseLeave={e=>e.currentTarget.style.background="none"}>
                        <User size={15} color={T.teal}/> View My Profile
                      </button>
                      {currentUser.role==="admin" && (
                        <button onClick={() => { setView("admin"); setDropdown(false); }}
                          style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 16px", border:"none", background:"none", cursor:"pointer", fontSize:13, color:T.text, textAlign:"left", fontWeight:500 }}
                          onMouseEnter={e=>e.currentTarget.style.background=T.bg}
                          onMouseLeave={e=>e.currentTarget.style.background="none"}>
                          <Shield size={15} color="#5B21B6"/> Admin Panel
                        </button>
                      )}
                      {currentUser.role==="doctor" && (
                        <button onClick={() => { setView("stats"); setDropdown(false); }}
                          style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 16px", border:"none", background:"none", cursor:"pointer", fontSize:13, color:T.text, textAlign:"left", fontWeight:500 }}
                          onMouseEnter={e=>e.currentTarget.style.background=T.bg}
                          onMouseLeave={e=>e.currentTarget.style.background="none"}>
                          <Activity size={15} color={T.navy}/> My Activity
                        </button>
                      )}
                      <div style={{ height:1, background:T.border, margin:"4px 0" }}/>
                      <button onClick={() => { setDropdown(false); onLogout(); }}
                        style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 16px", border:"none", background:"none", cursor:"pointer", fontSize:13, color:T.red, textAlign:"left", fontWeight:600 }}
                        onMouseEnter={e=>e.currentTarget.style.background=T.redBg}
                        onMouseLeave={e=>e.currentTarget.style.background="none"}>
                        <LogOut size={15} color={T.red}/> Log Out
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Scrollable content */}
            <div style={{ flex:1, overflowY:"auto", padding:26 }}>

              {/* ━━━ CASE FEED ━━━ */}
              {view === "posts" && (
                <>
                  {/* Controls bar */}
                  <div style={{ display:"flex", gap:10, marginBottom:18, flexWrap:"wrap", alignItems:"center" }}>
                    <div style={{ position:"relative", flex:"1 1 180px" }}>
                      <Search size={13} style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)", color:T.muted }}/>
