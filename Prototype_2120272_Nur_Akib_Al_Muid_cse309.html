                      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search cases…"
                        style={{ width:"100%", paddingLeft:30, paddingRight:11, height:36, border:`1px solid ${T.border}`, borderRadius:8, fontSize:13, outline:"none", color:T.text }} />
                    </div>
                    <select value={filterCat} onChange={e => setFilterCat(e.target.value)}
                      style={{ height:36, padding:"0 11px", border:`1px solid ${T.border}`, borderRadius:8, fontSize:13, color:T.text, outline:"none" }}>
                      <option value="All">All Categories</option>
                      {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                    {/* New case button — patients and admins only */}
                    {(currentUser.role==="patient" || currentUser.role==="admin") && (
                      <button onClick={() => setShowCreate(true)}
                        style={{ display:"flex", alignItems:"center", gap:6, padding:"0 16px", height:36, background:T.navy, color:"#fff", border:"none", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:700, flexShrink:0 }}>
                        <Plus size={14}/> New Case
                      </button>
                    )}
                  </div>

                  {/* Contextual info banners */}
                  {currentUser.role==="doctor" && (
                    <div style={{ background:T.tealLight, border:`1px solid ${T.teal}44`, borderRadius:10, padding:"11px 15px", marginBottom:18, display:"flex", gap:9, alignItems:"center" }}>
                      <Stethoscope size={15} color={T.teal} style={{ flexShrink:0 }}/>
                      <span style={{ fontSize:13, color:T.teal, fontWeight:500 }}>
                        You can view all patient cases. Expand a case to post your clinical opinion. You can only edit or delete your own comments.
                      </span>
                    </div>
                  )}
                  {currentUser.role==="patient" && (
                    <div style={{ background:"#EDE9FE", border:"1px solid #C4B5FD", borderRadius:10, padding:"11px 15px", marginBottom:18, display:"flex", gap:9, alignItems:"center" }}>
                      <Lock size={15} color="#5B21B6" style={{ flexShrink:0 }}/>
                      <span style={{ fontSize:13, color:"#5B21B6", fontWeight:500 }}>
                        Your cases are strictly private — only verified doctors and admins can see them.
                        After you submit, our AI panel pre-screens your case immediately while you await a human specialist.
                      </span>
                    </div>
                  )}

                  {/* Post list */}
                  {visiblePosts.length === 0 ? (
                    <div style={{ textAlign:"center", padding:"56px 20px", color:T.muted }}>
                      <FileText size={38} color={T.border} style={{ display:"block", margin:"0 auto 11px" }}/>
                      <h3 style={{ color:T.navy, marginBottom:7 }}>No cases found</h3>
                      <p style={{ fontSize:14 }}>
                        {currentUser.role==="patient" ? "Submit your first case to get a specialist second opinion." : "No cases match your current filters."}
                      </p>
                      {currentUser.role==="patient" && (
                        <button onClick={() => setShowCreate(true)}
                          style={{ marginTop:14, padding:"9px 22px", background:T.navy, color:"#fff", border:"none", borderRadius:8, cursor:"pointer", fontWeight:700 }}>
                          Submit a Case
                        </button>
                      )}
                    </div>
                  ) : visiblePosts.map(p => (
                    <PostCard key={p.id} post={p} currentUser={currentUser}
                      onEdit={setEditPost}
                      onDelete={handleDeletePost}
                      onComment={handleComment}
                      onEditComment={handleEditComment}
                      onDeleteComment={handleDeleteComment}
                      onLikePost={handleLikePost}
                      onDislikePost={handleDislikePost}
                      onLikeComment={handleLikeComment}
                      onDislikeComment={handleDislikeComment}
                      onAddReply={handleAddReply}
                      onEditReply={handleEditReply}
                      onDeleteReply={handleDeleteReply}
                      onLikeReply={handleLikeReply}
                      onDislikeReply={handleDislikeReply} />
                  ))}
                </>
              )}

              {/* ━━━ PROFILE ━━━ */}
              {view === "profile" && (
                <div style={{ maxWidth:580 }}>
                  <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:14, overflow:"hidden" }}>
                    <div style={{ background:T.gradient, padding:"28px 24px", color:"#fff", display:"flex", gap:18, alignItems:"center" }}>
                      <Avatar initials={currentUser.avatar} size={66} bg="rgba(255,255,255,0.18)" color="#fff"/>
                      <div>
                        <h2 style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, marginBottom:5 }}>{currentUser.name}</h2>
                        <RoleBadge role={currentUser.role}/>
                        {currentUser.specialty && currentUser.specialty!=="—" && (
                          <p style={{ color:"rgba(255,255,255,0.68)", fontSize:13, marginTop:5 }}>{currentUser.specialty}</p>
                        )}
                      </div>
                    </div>
                    <div style={{ padding:24 }}>
                      {[
                        { label:"Email",        value: currentUser.email },
                        { label:"Role",         value: currentUser.role.charAt(0).toUpperCase()+currentUser.role.slice(1) },
                        { label:"Specialty",    value: currentUser.specialty || "—" },
                        { label:"Hospital",     value: currentUser.hospital  || "—" },
                        { label:"Member Since", value: currentUser.joinDate  || "—" },
                      ].map(r => (
                        <div key={r.label} style={{ display:"flex", justifyContent:"space-between", padding:"11px 0", borderBottom:`1px solid ${T.border}` }}>
                          <span style={{ fontSize:13, color:T.muted, fontWeight:500 }}>{r.label}</span>
                          <span style={{ fontSize:13, color:T.text, fontWeight:600 }}>{r.value}</span>
                        </div>
                      ))}
                      {currentUser.bio && <p style={{ marginTop:14, fontSize:14, color:T.muted, lineHeight:1.65 }}>{currentUser.bio}</p>}
                      {/* Activity summary tiles */}
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:11, marginTop:18 }}>
                        <div style={{ background:T.tealLight, borderRadius:10, padding:14, textAlign:"center" }}>
                          <div style={{ fontSize:26, fontWeight:700, color:T.teal }}>
                            {currentUser.role==="patient"
                              ? posts.filter(p=>p.authorId===currentUser.id).length
                              : posts.flatMap(p=>p.comments).filter(c=>c.authorId===currentUser.id).length}
                          </div>
                          <div style={{ fontSize:12, color:T.muted }}>{currentUser.role==="patient" ? "Cases Submitted" : "Opinions Given"}</div>
                        </div>
                        <div style={{ background:T.amberBg, borderRadius:10, padding:14, textAlign:"center" }}>
                          <div style={{ fontSize:26, fontWeight:700, color:T.amber }}>
                            {currentUser.role==="patient"
                              ? posts.filter(p=>p.authorId===currentUser.id&&p.status==="responded").length
                              : posts.filter(p=>p.comments.some(c=>c.authorId===currentUser.id)).length}
                          </div>
                          <div style={{ fontSize:12, color:T.muted }}>{currentUser.role==="patient" ? "Cases Responded" : "Cases Participated"}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ━━━ ADMIN PANEL ━━━ */}
              {view === "admin" && currentUser.role==="admin" && (
                <>
                  {/* Stats grid */}
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:14, marginBottom:26 }}>
                    {[
                      { label:"Total Cases",        value:posts.length,   icon:<FileText size={19}/>, bg:T.tealLight, color:T.teal },
                      { label:"Awaiting Review",    value:pendingCount,   icon:<Clock size={19}/>,    bg:T.amberBg,   color:T.amber },
                      { label:"Registered Patients",value:totalPatients,  icon:<Users size={19}/>,    bg:"#EDE9FE",   color:"#5B21B6" },
                      { label:"Active Doctors",     value:totalDoctors,   icon:<Stethoscope size={19}/>, bg:T.greenBg, color:T.green },
                    ].map(s => (
                      <div key={s.label} style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, padding:18 }}>
                        <div style={{ width:38, height:38, background:s.bg, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", color:s.color, marginBottom:11 }}>{s.icon}</div>
                        <div style={{ fontSize:28, fontWeight:700, color:T.navy }}>{s.value}</div>
                        <div style={{ fontSize:12, color:T.muted, marginTop:2 }}>{s.label}</div>
                      </div>
                    ))}
                  </div>

                  {/* Case overview table */}
                  <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, overflow:"hidden" }}>
                    <div style={{ padding:"14px 18px", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <h3 style={{ fontSize:14, fontWeight:700, color:T.navy }}>All Cases — Admin Overview</h3>
                      <button onClick={() => setView("posts")} style={{ fontSize:13, color:T.teal, background:"none", border:"none", cursor:"pointer", fontWeight:600 }}>View Full Feed →</button>
                    </div>
                    <div style={{ overflowX:"auto" }}>
                      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                        <thead>
                          <tr style={{ background:"#F8FAFC" }}>
                            {["Case Title","Patient","Category","Status","Opinions","Posted"].map(h => (
                              <th key={h} style={{ padding:"9px 15px", textAlign:"left", color:T.muted, fontWeight:600, borderBottom:`1px solid ${T.border}`, whiteSpace:"nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {posts.map(p => {
                            const sta = statusBadge(p.status);
                            return (
                              <tr key={p.id} style={{ borderBottom:`1px solid ${T.border}` }}>
                                <td style={{ padding:"11px 15px", color:T.navy, fontWeight:600, maxWidth:220 }}>
                                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.title}</div>
                                </td>
                                <td style={{ padding:"11px 15px", color:T.muted }}>{p.authorName}</td>
                                <td style={{ padding:"11px 15px" }}>
                                  <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20, background:T.tealLight, color:T.teal, fontWeight:600 }}>{p.category}</span>
                                </td>
                                <td style={{ padding:"11px 15px" }}>
                                  <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20, background:sta.bg, color:sta.color, fontWeight:600 }}>{sta.label}</span>
                                </td>
                                <td style={{ padding:"11px 15px", color:T.muted, textAlign:"center" }}>{p.comments.length}</td>
                                <td style={{ padding:"11px 15px", color:T.muted, whiteSpace:"nowrap" }}>{new Date(p.createdAt).toLocaleDateString("en-GB")}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </>
              )}

              {/* ━━━ USER MANAGEMENT (admin only) ━━━ */}

          postId: "p-1",
          isRead: false,
          createdAt: "2024-02-10T14:30:00",
        },
        {
          id: "n-seed-2",
          forUserId: "u-pat1",
          type: "comment",
          message: "Dr. Sarah Chen also commented on your case",
          postTitle: "Need a Second Opinion on Mild Aortic Stenosis Diagnosis",
          postId: "p-1",
          isRead: false,
          createdAt: "2024-02-11T08:00:00",
        },
        {
          id: "n-seed-3",
          forUserId: "u-doc1",
          type: "new_post",
          message: "New patient case submitted in Neurology",
          postTitle: "Uncertain About MRI Finding — Possible MS Diagnosis",
          postId: "p-2",
          isRead: false,
          createdAt: "2024-02-14T16:45:00",
        },
        {
          id: "n-seed-4",
          forUserId: "u-doc2",
          type: "new_post",
          message: "New patient case submitted in Cardiology",
          postTitle: "Need a Second Opinion on Mild Aortic Stenosis Diagnosis",
          postId: "p-1",
          isRead: true,
          createdAt: "2024-02-10T09:15:00",
        },
      ]);

      /* addNotification — called by Dashboard whenever a new comment or post
         is created. I push a new notification object into the shared array. */
      const addNotification = (notif) => {
        setNotifications(prev => [{ ...notif, id: "n-" + Date.now(), createdAt: new Date().toISOString() }, ...prev]);
      };

      const handleAuth   = user => { setCurrentUser(user); setAuthMode(null); };
      const handleLogout = ()   => { setCurrentUser(null); setAuthMode(null); setLandingPage("home"); };

      /* Route between public pages */
      if (!currentUser) {
        if (landingPage === "about") {
          return <AboutPage onBack={() => setLandingPage("home")} onRegister={() => { setLandingPage("home"); setAuthMode("register"); }}/>;
        }
        if (landingPage === "contact") {
          return <ContactPage onBack={() => setLandingPage("home")}/>;
        }
        return (
          <>
            <LandingPage
              onLogin={()    => setAuthMode("login")}
              onRegister={() => setAuthMode("register")}
              onAbout={()   => setLandingPage("about")}
              onContact={()  => setLandingPage("contact")}/>
            {authMode && (
              <AuthModal mode={authMode} onClose={() => setAuthMode(null)}
                onAuth={handleAuth} users={users} setUsers={setUsers}/>
            )}
          </>
        );
      }

      return (
        <Dashboard
          currentUser={currentUser}
          users={users}
          posts={posts}
          setPosts={setPosts}
          onLogout={handleLogout}
          notifications={notifications}
          setNotifications={setNotifications}
          addNotification={addNotification}/>
      );
    }

    // ── Mount the React app into the #root div ────────────────
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

  </script>
</body>
</html>
